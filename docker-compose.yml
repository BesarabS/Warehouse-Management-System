version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: warehouse_db
    restart: always
    environment:
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_password
      POSTGRES_DB: warehouse_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: warehouse_web
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://warehouse_user:warehouse_password@db:5432/warehouse_management
    depends_on:
      - db

volumes:
  postgres_data: